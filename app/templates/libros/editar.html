{% extends 'base.html' %}

{% block title %}Editar Libro{% endblock %}

{% block content %}
<h1>Editar Libro</h1>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Título</label>
            <input type="text" name="titulo" value="{{ libro.titulo }}" required>
        </div>
        <div class="form-group">
            <label>Autor</label>
            <input type="text" name="autor" value="{{ libro.autor }}" required>
        </div>
        <div class="form-group">
            <label>Editorial</label>
            <input type="text" name="editorial" value="{{ libro.editorial }}" required>
        </div>
        <div class="form-group">
            <label>Año de publicación</label>
            <input type="number" name="anio_publicacion" value="{{ libro.anio_publicacion }}" required>
        </div>
        <div class="form-group">
            <label>Cantidad de ejemplares</label>
            <input type="number" name="cantidad_ejemplares" value="{{ libro.cantidad_ejemplares }}" required>
        </div>
        <div class="actions">
            <button type="submit">Guardar cambios</button>
            <a href="/libros/" class="btn-secondary">Volver</a>
        </div>
    </form>
</div>
{% endblock %}
