<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Libro</title>
</head>
<body>
    <h1>Agregar Libro</h1>
    <form method="POST">
        <label>Título</label>
        <input type="text" name="titulo" required><br>
        
        <label>Autor</label>
        <input type="text" name="autor" required><br>
        
        <label>Editorial</label>
        <input type="text" name="editorial" required><br>
        
        <label>Año de publicación</label>
        <input type="number" name="anio_publicacion" required><br>
        
        <label>Cantidad de ejemplares</label>
        <input type="number" name="cantidad_ejemplares" required><br>
        
        <button type="submit">Guardar</button>
    </form>
    <a href="/libros/">Volver</a>
</body>
</html>
