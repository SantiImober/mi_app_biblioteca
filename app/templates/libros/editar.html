<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Libro</title>
</head>
<body>
    <h1>Editar Libro</h1>
    <form method="POST">
        <label>Título</label>
        <input type="text" name="titulo" value="{{ libro.titulo }}" required><br>
        
        <label>Autor</label>
        <input type="text" name="autor" value="{{ libro.autor }}" required><br>
        
        <label>Editorial</label>
        <input type="text" name="editorial" value="{{ libro.editorial }}" required><br>
        
        <label>Año de publicación</label>
        <input type="number" name="anio_publicacion" value="{{ libro.anio_publicacion }}" required><br>
        
        <label>Cantidad de ejemplares</label>
        <input type="number" name="cantidad_ejemplares" value="{{ libro.cantidad_ejemplares }}" required><br>
        
        <button type="submit">Guardar cambios</button>
    </form>
    <a href="/libros/">Volver</a>
</body>
</html>
